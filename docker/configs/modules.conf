;; modules.conf — Asterisk module loading configuration

[modules]
autoload=yes

; ── Ensure our key modules are loaded ──
load => chan_dongle.so
load => chan_iax2.so
load => res_srtp.so

; ── Don't load modules we removed or that have missing dependencies ──
; pjsip stack not installed (no bundled pjproject)
noload => chan_pjsip.so
noload => res_pjsip.so
noload => res_pjsip_pubsub.so
noload => res_pjsip_session.so
; res_speech was removed
noload => res_speech.so
noload => app_speech_utils.so
noload => res_agi.so
; res_ari was removed
noload => res_ari.so
noload => app_stasis.so
; No config / not needed for GSM gateway
noload => res_stun_monitor.so
noload => res_clialiases.so
noload => app_amd.so
noload => app_getcpeid.so
noload => pbx_ael.so
