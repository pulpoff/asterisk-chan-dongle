###############################################################################
# docker-compose.yml — Asterisk + chan_dongle GSM Gateway
#
# Usage:
#   TRUNK_USER=myuser TRUNK_PASS=mypass TRUNK_HOST=pbx.example.com docker compose up -d
#
# Or create a .env file (see docker/.env.example)
###############################################################################

services:
  asterisk-dongle:
    image: ghcr.io/pulpoff/asterisk-chan-dongle:latest
    container_name: asterisk-dongle
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      # Persist IAX2/TLS keys across container recreates
      - asterisk-keys:/var/lib/asterisk/keys
      # Optional: drop .conf files here to override generated configs
      # - ./configs:/etc/asterisk/custom:ro
      # Optional: mount your own TLS certs (self-signed generated if absent)
      # - ./tls/asterisk.pem:/etc/asterisk/tls/asterisk.pem:ro
      # - ./tls/ca.crt:/etc/asterisk/tls/ca.crt:ro
    environment:
      - TRUNK_PROTO=${TRUNK_PROTO:-iax}
      - TRUNK_USER=${TRUNK_USER}
      - TRUNK_PASS=${TRUNK_PASS}
      - TRUNK_HOST=${TRUNK_HOST}
      - TRUNK_PORT=${TRUNK_PORT:-}
      - DONGLE_CONTEXT=${DONGLE_CONTEXT:-from-dongle}
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyUSB2:/dev/ttyUSB2
      - /dev/ttyUSB3:/dev/ttyUSB3

volumes:
  asterisk-keys:
